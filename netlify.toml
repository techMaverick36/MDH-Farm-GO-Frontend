# Netlify config for the MDH Farm GO web app (Vite + React Router SPA).

[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: serve index.html for every path so reloading a deep link like
# /deliveries does not 404 - React Router takes over on the client.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
